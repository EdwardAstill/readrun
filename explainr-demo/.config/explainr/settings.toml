# Explainr keyboard shortcuts
# Place this file at .config/explainr/settings.toml in your content directory.
#
# Binding format:
#   Single key:    "j", "G", "?", "/", "+"
#   With modifier: "Shift+Space", "Shift+T"
#   Chord (two keys in sequence): "g h", "g g"

[shortcuts]
nextPage       = "j"
prevPage       = "k"
goHome         = "g h"
scrollDown     = "Space"
scrollUp       = "Shift+Space"
scrollToTop    = "g g"
scrollToBottom = "G"
toggleSidebar  = "s"
focusMode      = "f"
nextTheme      = "t"
prevTheme      = "T"
fontIncrease   = "+"
fontDecrease   = "-"
search         = "/"
showShortcuts  = "?"
closeOverlay   = "Escape"
